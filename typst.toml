[package]
name = "diffst"
version = "0.1.0"
entrypoint = "lib.typ"
authors = ["Calvin Khor"]
license = "MIT"
description = "Presentable side-by-side document diff reports."
keywords = ["diff", "comparison", "review", "wasm"]
categories = ["utility"]
compiler = "0.15.0"
exclude = [
  "/src",
  "/target",
  "/scripts",
  "/tests",
  "/examples",
  "/Cargo.toml",
  "/Cargo.lock",
  "/impl.md",
  "/audit.md",
  "/previous-audit-fix.md",
  "/clean_readme.md",
]
